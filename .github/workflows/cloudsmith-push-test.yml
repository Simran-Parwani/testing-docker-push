name: Cloudsmith Push Test

on:
  workflow_dispatch:

jobs:
  docker-push-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Cloudsmith
        uses: docker/login-action@v3
        with:
          registry: docker.cloudsmith.io
          username: ${{ secrets.EA_CLOUDSMITH_USER }}
          password: ${{ secrets.EA_CLOUDSMITH_API_KEY }}

      - name: Pull test image
        run: docker pull alpine:latest

      - name: Tag image
        run: |
          docker tag alpine:latest docker.cloudsmith.io/simran-parwani-testorg/docker/test-image:debug-test1

      - name: Push image
        run: |
          docker push docker.cloudsmith.io/simran-parwani-testorg/docker/test-image:debug-test1
